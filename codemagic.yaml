workflows:
  ios-release:
    name: iOS App Store Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Bonistock ASC
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.bonifatus.bonistock
      node: 22
      xcode: latest
      cocoapods: default
    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true
    scripts:
      - name: Set up Node 22
        script: |
          nvm install 22
          nvm use 22
          node --version

      - name: Install Node dependencies
        script: npm ci

      - name: Generate iOS project
        script: |
          mkdir -p out
          rm -rf ios
          npx cap add ios --packagemanager CocoaPods
          echo "=== iOS project created ==="
          ls ios/App/Podfile

      - name: Sync Capacitor
        script: |
          npx cap sync ios
          echo "=== Sync complete, workspace check ==="
          ls ios/App/App.xcworkspace

      - name: Set export compliance flag
        script: |
          /usr/libexec/PlistBuddy -c "Add :ITSAppUsesNonExemptEncryption bool false" ios/App/App/Info.plist
          echo "=== ITSAppUsesNonExemptEncryption set to NO ==="

      - name: Set up code signing
        script: xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --workspace "ios/App/App.xcworkspace" \
            --scheme "App"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        expire_build_submitted_for_review: true
